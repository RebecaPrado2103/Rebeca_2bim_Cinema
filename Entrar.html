<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cinema</title>
    <link rel="stylesheet" href="Entrar.css">
</head>
<body>
    <main>
        <header>
            <h1>CINEMA</h1>
            <p>Preencha os dados requisaitados para entrar no nosso site.</p>
        </header>
        
        <section>
            <form id="formEntrar" action="Cinema.html" method="GET">
                <div class="campo">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="nome" required placeholder="Digite seu nome completo">
                </div>

                <div class="campo">
                        <label for="cpf">CPF:</label>
                        <input type="text" id="cpf" name="cpf" required placeholder="Digite seu cpf">
                </div>

                <div class="campo">
                        <label for="idade">Idade:</label>
                        <input type="number" id="idade" name="idade" required min="1" placeholder="Digite sua idade">
                </div>

                <button type="submit">Entrar</button>
            </form>
        </section>
    </main>
    <script src="Entrar.js"></script>
</body>
</html>
